services:
  # 1. Node.js Backend API (This Repo)
  - type: web
    name: nalas-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          name: nalas-ml-service
          type: pservice
          property: host
      - key: ML_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"

  # 2. Python ML Costing Service (External Repo)
  - type: pservice
    name: nalas-ml-service
    repo: https://github.com/Nalas-app/Nalas_ML_Team.git
    branch: feat/production-readiness-jai
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ML_API_KEY
        fromService:
          name: nalas-backend
          type: web
          property: envVar:ML_API_KEY
      - key: ML_PORT
        value: 8001
