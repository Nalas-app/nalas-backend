services:
  # 1. Node.js Backend API (This Repo)
  - type: web
    name: nalas-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          name: nalas-ml-service
          type: web
          property: host
      - key: ML_API_KEY
        sync: false # Set manually in dashboard
      - key: JWT_SECRET
        sync: false # Set manually in dashboard
      - key: ALLOWED_ORIGINS
        value: "*"

  # 2. Python ML Costing Service (External Repo)
  - type: web
    name: nalas-ml-service
    repo: https://github.com/Nalas-app/Nalas_ML_Team.git
    branch: ML-Costing-Lead
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT # Standard port for Render Web Services
        value: 8001
      - key: DATABASE_URL
        sync: false
      - key: ML_API_KEY
        sync: false
      - key: ML_PORT
        value: 8001
