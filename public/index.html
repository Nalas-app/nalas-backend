<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing & Payments - Catering Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-healthy {
            background: #10b981;
            color: white;
        }

        .status-error {
            background: #ef4444;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .result-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .result-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background: #f3f4f6;
        }

        .nav-tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .api-info {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .api-info code {
            background: #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Billing & Payments Module</h1>
            <p>Catering Management System</p>
            <div style="margin-top: 15px;">
                <span id="statusBadge" class="status-badge status-healthy">Checking...</span>
            </div>
        </div>

        <div class="api-info">
            <strong>API Base URL:</strong> <code id="apiBaseUrl">http://localhost:3000</code>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('health')">🏥 Health</button>
            <button class="nav-tab" onclick="showTab('quotations')">📄 Quotations</button>
            <button class="nav-tab" onclick="showTab('invoices')">📊 Invoices</button>
            <button class="nav-tab" onclick="showTab('payments')">💳 Payments</button>
        </div>

        <!-- Health Tab -->
        <div id="health" class="tab-content active">
            <div class="card">
                <h2>API Health Check</h2>
                <button class="btn btn-primary" onclick="checkHealth()">Check Health</button>
                <div id="healthResult" class="result-box" style="display: none;"></div>
            </div>
        </div>

        <!-- Quotations Tab -->
        <div id="quotations" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>Create Quotation</h2>
                    <form onsubmit="createQuotation(event)">
                        <div class="form-group">
                            <label>Order ID</label>
                            <input type="text" id="quotationOrderId" placeholder="Enter order ID" required>
                        </div>
                        <div class="form-group">
                            <label>Subtotal (₹)</label>
                            <input type="number" id="quotationSubtotal" placeholder="10000" required>
                        </div>
                        <div class="form-group">
                            <label>Labor Cost (₹)</label>
                            <input type="number" id="quotationLabor" placeholder="1500" required>
                        </div>
                        <div class="form-group">
                            <label>Overhead Cost (₹)</label>
                            <input type="number" id="quotationOverhead" placeholder="1000" required>
                        </div>
                        <div class="form-group">
                            <label>Tax Amount (₹)</label>
                            <input type="number" id="quotationTax" placeholder="625" required>
                        </div>
                        <div class="form-group">
                            <label>Grand Total (₹)</label>
                            <input type="number" id="quotationTotal" placeholder="13125" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Quotation</button>
                    </form>
                    <div id="quotationResult" class="result-box" style="display: none;"></div>
                </div>

                <div class="card">
                    <h2>Get Quotation</h2>
                    <form onsubmit="getQuotation(event)">
                        <div class="form-group">
                            <label>Quotation ID</label>
                            <input type="text" id="getQuotationId" placeholder="Enter quotation ID">
                        </div>
                        <div class="form-group">
                            <label>Or Order ID</label>
                            <input type="text" id="getQuotationOrderId" placeholder="Enter order ID">
                        </div>
                        <button type="submit" class="btn btn-secondary">Get Quotation</button>
                    </form>
                    <div id="getQuotationResult" class="result-box" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- Invoices Tab -->
        <div id="invoices" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>Create Invoice</h2>
                    <form onsubmit="createInvoice(event)">
                        <div class="form-group">
                            <label>Order ID</label>
                            <input type="text" id="invoiceOrderId" placeholder="Enter order ID" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Invoice</button>
                    </form>
                    <div id="invoiceResult" class="result-box" style="display: none;"></div>
                </div>

                <div class="card">
                    <h2>Get Invoice</h2>
                    <form onsubmit="getInvoice(event)">
                        <div class="form-group">
                            <label>Invoice ID</label>
                            <input type="text" id="getInvoiceId" placeholder="Enter invoice ID">
                        </div>
                        <div class="form-group">
                            <label>Or Order ID</label>
                            <input type="text" id="getInvoiceOrderId" placeholder="Enter order ID">
                        </div>
                        <button type="submit" class="btn btn-secondary">Get Invoice</button>
                    </form>
                    <div id="getInvoiceResult" class="result-box" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- Payments Tab -->
        <div id="payments" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h2>Record Payment</h2>
                    <form onsubmit="recordPayment(event)">
                        <div class="form-group">
                            <label>Invoice ID</label>
                            <input type="text" id="paymentInvoiceId" placeholder="Enter invoice ID" required>
                        </div>
                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" id="paymentAmount" placeholder="5000" required>
                        </div>
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="">Select method</option>
                                <option value="cash">Cash</option>
                                <option value="upi">UPI</option>
                                <option value="card">Card</option>
                                <option value="bank_transfer">Bank Transfer</option>
                                <option value="cheque">Cheque</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Transaction ID (Optional)</label>
                            <input type="text" id="paymentTransactionId" placeholder="TXN123456">
                        </div>
                        <button type="submit" class="btn btn-success">Record Payment</button>
                    </form>
                    <div id="paymentResult" class="result-box" style="display: none;"></div>
                </div>

                <div class="card">
                    <h2>Get Payments</h2>
                    <form onsubmit="getPayments(event)">
                        <div class="form-group">
                            <label>Invoice ID (Optional)</label>
                            <input type="text" id="getPaymentInvoiceId" placeholder="Enter invoice ID">
                        </div>
                        <button type="submit" class="btn btn-secondary">Get Payments</button>
                    </form>
                    <div id="getPaymentResult" class="result-box" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/billing';

        // Tab Navigation
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Helper function to show results
        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'result-box ' + (isError ? 'result-error' : 'result-success');
            element.textContent = isError ? 'Error: ' + data : JSON.stringify(data, null, 2);
        }

        // Health Check
        async function checkHealth() {
            try {
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                
                const badge = document.getElementById('statusBadge');
                badge.className = 'status-badge ' + (response.ok ? 'status-healthy' : 'status-error');
                badge.textContent = response.ok ? '✅ Healthy' : '❌ Error';
                
                showResult('healthResult', data);
            } catch (error) {
                const badge = document.getElementById('statusBadge');
                badge.className = 'status-badge status-error';
                badge.textContent = '❌ Error';
                showResult('healthResult', error.message, true);
            }
        }

        // Create Quotation
        async function createQuotation(event) {
            event.preventDefault();
            try {
                const data = {
                    orderId: document.getElementById('quotationOrderId').value,
                    subtotal: parseFloat(document.getElementById('quotationSubtotal').value),
                    laborCost: parseFloat(document.getElementById('quotationLabor').value),
                    overheadCost: parseFloat(document.getElementById('quotationOverhead').value),
                    taxAmount: parseFloat(document.getElementById('quotationTax').value),
                    grandTotal: parseFloat(document.getElementById('quotationTotal').value)
                };

                const response = await fetch(`${API_BASE}/quotations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to create quotation');
                showResult('quotationResult', result);
            } catch (error) {
                showResult('quotationResult', error.message, true);
            }
        }

        // Get Quotation
        async function getQuotation(event) {
            event.preventDefault();
            try {
                const id = document.getElementById('getQuotationId').value;
                const orderId = document.getElementById('getQuotationOrderId').value;
                
                let url = `${API_BASE}/quotations/`;
                if (id) url += id;
                else if (orderId) url += `order/${orderId}`;
                else throw new Error('Please enter Quotation ID or Order ID');

                const response = await fetch(url);
                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to get quotation');
                showResult('getQuotationResult', result);
            } catch (error) {
                showResult('getQuotationResult', error.message, true);
            }
        }

        // Create Invoice
        async function createInvoice(event) {
            event.preventDefault();
            try {
                const data = {
                    orderId: document.getElementById('invoiceOrderId').value
                };

                const response = await fetch(`${API_BASE}/invoices`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to create invoice');
                showResult('invoiceResult', result);
            } catch (error) {
                showResult('invoiceResult', error.message, true);
            }
        }

        // Get Invoice
        async function getInvoice(event) {
            event.preventDefault();
            try {
                const id = document.getElementById('getInvoiceId').value;
                const orderId = document.getElementById('getInvoiceOrderId').value;
                
                let url = `${API_BASE}/invoices/`;
                if (id) url += id;
                else if (orderId) url += `order/${orderId}`;
                else throw new Error('Please enter Invoice ID or Order ID');

                const response = await fetch(url);
                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to get invoice');
                showResult('getInvoiceResult', result);
            } catch (error) {
                showResult('getInvoiceResult', error.message, true);
            }
        }

        // Record Payment
        async function recordPayment(event) {
            event.preventDefault();
            try {
                const data = {
                    invoiceId: document.getElementById('paymentInvoiceId').value,
                    amount: parseFloat(document.getElementById('paymentAmount').value),
                    paymentMethod: document.getElementById('paymentMethod').value,
                    transactionId: document.getElementById('paymentTransactionId').value || null
                };

                const response = await fetch(`${API_BASE}/payments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to record payment');
                showResult('paymentResult', result);
            } catch (error) {
                showResult('paymentResult', error.message, true);
            }
        }

        // Get Payments
        async function getPayments(event) {
            event.preventDefault();
            try {
                const invoiceId = document.getElementById('getPaymentInvoiceId').value;
                
                let url = `${API_BASE}/payments`;
                if (invoiceId) url += `?invoiceId=${invoiceId}`;

                const response = await fetch(url);
                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || 'Failed to get payments');
                showResult('getPaymentResult', result);
            } catch (error) {
                showResult('getPaymentResult', error.message, true);
            }
        }

        // Check health on load
        checkHealth();
    </script>
</body>
</html>
